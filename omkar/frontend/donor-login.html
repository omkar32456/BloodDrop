<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Login - BloodDrop</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo">
      <h2>🩸 Blood<span>Drop</span></h2>
      <p>Donor Portal</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Login</button>
      <button class="auth-tab" onclick="showTab('register')">Register</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="form-submit" id="loginBtn">Login</button>
      <p class="auth-link">Don't have an account? <a href="#" onclick="showTab('register')">Register here</a></p>
      <p class="auth-link"><a href="index.html">← Back to Home</a></p>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="r-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Blood Group *</label>
          <select id="r-blood" required>
            <option value="">Select</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
            <option>O+</option><option>O-</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="r-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="r-password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="r-phone" placeholder="+91 9999999999">
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="r-age" placeholder="18-65" min="18" max="65">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="r-city" placeholder="Mumbai">
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" id="r-state" placeholder="Maharashtra">
        </div>
      </div>
      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="r-weight" placeholder="50+ kg" min="50">
      </div>
      <button type="submit" class="form-submit" id="registerBtn">Create Account</button>
      <p class="auth-link">Already registered? <a href="#" onclick="showTab('login')">Login here</a></p>
      <p class="auth-link"><a href="index.html">← Back to Home</a></p>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
  hideAlert();
}

// Auto open register tab if URL has ?tab=register
if (window.location.search.includes('tab=register')) showTab('register');

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const data = await api('/donor/login', 'POST', { email: val('l-email'), password: val('l-password') });
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', 'donor');
    localStorage.setItem('user', JSON.stringify(data.donor));
    window.location.href = 'donor-dashboard.html';
  } catch(err) {
    showAlert(err.message, 'error');
    btn.disabled = false; btn.textContent = 'Login';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const data = await api('/donor/register', 'POST', {
      name: val('r-name'), email: val('r-email'), password: val('r-password'),
      phone: val('r-phone'), blood_group: val('r-blood'), city: val('r-city'),
      state: val('r-state'), age: val('r-age'), weight: val('r-weight')
    });
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', 'donor');
    localStorage.setItem('user', JSON.stringify(data.donor));
    window.location.href = 'donor-dashboard.html';
  } catch(err) {
    showAlert(err.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>

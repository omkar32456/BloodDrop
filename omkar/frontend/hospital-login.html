<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Login - BloodDrop</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page" style="background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);">
  <div class="auth-box">
    <div class="logo">
      <h2>🏥 Blood<span>Drop</span></h2>
      <p>Hospital Portal</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- LOGIN -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Hospital Email</label>
        <input type="email" id="l-email" placeholder="hospital@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="form-submit" id="loginBtn" style="background:#1a1a2e;">Login</button>
      <p class="auth-link">New hospital? <a href="#" onclick="showTab('register')">Register here</a></p>
      <p class="auth-link"><a href="index.html">← Back to Home</a></p>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
      <div class="form-group">
        <label>Hospital Name *</label>
        <input type="text" id="r-name" placeholder="City General Hospital" required>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="r-email" placeholder="hospital@email.com" required>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="r-password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="r-phone" placeholder="+91 9999999999" required>
        </div>
        <div class="form-group">
          <label>License No. *</label>
          <input type="text" id="r-license" placeholder="MH-HOSP-2024" required>
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="r-address" placeholder="123 Main Street">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City *</label>
          <input type="text" id="r-city" placeholder="Mumbai" required>
        </div>
        <div class="form-group">
          <label>State *</label>
          <input type="text" id="r-state" placeholder="Maharashtra" required>
        </div>
      </div>
      <button type="submit" class="form-submit" id="registerBtn" style="background:#1a1a2e;">Register Hospital</button>
      <p class="auth-link">Already registered? <a href="#" onclick="showTab('login')">Login here</a></p>
      <p class="auth-link"><a href="index.html">← Back to Home</a></p>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  hideAlert();
}

// Auto open register tab if URL has ?tab=register
if (window.location.search.includes('tab=register')) showTab('register');

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const data = await api('/hospital/login', 'POST', {
      email: val('l-email'),
      password: val('l-password')
    });
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', 'hospital');
    localStorage.setItem('user', JSON.stringify(data.hospital));
    window.location.href = 'hospital-dashboard.html';
  } catch(err) {
    showAlert(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = 'Registering...';
  try {
    const payload = {
      name: val('r-name'),
      email: val('r-email'),
      password: val('r-password'),
      phone: val('r-phone'),
      license_no: val('r-license'),
      address: val('r-address'),
      city: val('r-city'),
      state: val('r-state')
    };
    const data = await api('/hospital/register', 'POST', payload);
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', 'hospital');
    localStorage.setItem('user', JSON.stringify(data.hospital));
    window.location.href = 'hospital-dashboard.html';
  } catch(err) {
    showAlert(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Register Hospital';
  }
}
</script>
</body>
</html>
